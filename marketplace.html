<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Don H Services | Marketplace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <img src="header.jpg" alt="Don H Services header" />
    <div class="header-overlay">
      <div class="container">
        <a class="back-link" href="index.html">← Back to Home</a>
        <h1>More Products</h1>
        <p>Browse more items available for delivery to Haiti.</p>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="grid products" id="productsGrid">
      <!-- Product cards generated by JS -->
    </div>
  </main>

  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div class="modal-body">
        <img id="modalImage" src="" alt="product" class="modal-image">
        <div class="modal-details">
          <h2 id="modalName"></h2>
          <div class="modal-price" id="modalPrice"></div>
          <p id="modalDesc"></p>
          <button id="modalBuyBtn" class="btn primary" style="width:100%;margin-top:1rem">Buy Now</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
